name: Torpaido CI

on:
  push:
    branches: [ main, dev/main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install uv
      uses: astral-sh/setup-uv@v4
    - name: Install dependencies
      run: |
        
        # Internal Gearlux dependencies — installed FIRST with --no-deps so
        # `-e .[dev]` below finds them pre-satisfied instead of hitting PyPI.
        uv pip install --system --no-deps git+https://github.com/Gearlux/log-flow.git@main
        uv pip install --system --no-deps git+https://github.com/Gearlux/confluid.git@main
        uv pip install --system --no-deps git+https://github.com/Gearlux/data-flux.git@main
        uv pip install --system -e ".[dev]"
    - name: Run Isort
      run: isort --check-only .
    - name: Run Black
      run: black --check .
    - name: Run Flake8
      run: flake8 .
    - name: Run Mypy
      run: mypy .

  unit-tests:
    name: Unit Tests & Coverage
    needs: [quality-gates]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install uv
      uses: astral-sh/setup-uv@v4
    - name: Install dependencies
      run: |
        
        # Internal Gearlux dependencies — installed FIRST with --no-deps so
        # `-e .[dev]` below finds them pre-satisfied instead of hitting PyPI.
        uv pip install --system --no-deps git+https://github.com/Gearlux/log-flow.git@main
        uv pip install --system --no-deps git+https://github.com/Gearlux/confluid.git@main
        uv pip install --system --no-deps git+https://github.com/Gearlux/data-flux.git@main
        uv pip install --system -e ".[dev]"
    - name: Run Tests
      run: |
        if [ -d tests ] && find tests -name '*.py' | grep -q .; then
          pytest tests --junitxml=test-report.xml --cov=torpaido --cov-report=xml --cov-report=term
        else
          echo "No tests found. Skipping."
        fi
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: test-report.xml
      if: always()

  verify-examples:
    name: Verify Examples
    needs: [unit-tests]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install uv
      uses: astral-sh/setup-uv@v4
    - name: Install dependencies
      run: |
        
        # Internal Gearlux dependencies — installed FIRST with --no-deps so
        # `-e .[dev]` below finds them pre-satisfied instead of hitting PyPI.
        uv pip install --system --no-deps git+https://github.com/Gearlux/log-flow.git@main
        uv pip install --system --no-deps git+https://github.com/Gearlux/confluid.git@main
        uv pip install --system --no-deps git+https://github.com/Gearlux/data-flux.git@main
        uv pip install --system -e ".[dev]"
    - name: Run Examples
      run: |
        for f in examples/*.py; do
          if [ -f "$f" ]; then
            echo "Verifying $f..."
            python3 "$f"
          fi
        done

  verify-notebooks:
    name: Verify Notebooks
    needs: [unit-tests]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install uv
      uses: astral-sh/setup-uv@v4
    - name: Install dependencies
      run: |
        
        # Internal Gearlux dependencies — installed FIRST with --no-deps so
        # `-e .[dev]` below finds them pre-satisfied instead of hitting PyPI.
        uv pip install --system --no-deps git+https://github.com/Gearlux/log-flow.git@main
        uv pip install --system --no-deps git+https://github.com/Gearlux/confluid.git@main
        uv pip install --system --no-deps git+https://github.com/Gearlux/data-flux.git@main
        uv pip install --system -e ".[dev]"
        # Notebook-only dependencies live in the optional `[notebook]` extra
        # when a project ships notebooks; absence is not an error.
        uv pip install --system -e ".[notebook]" 2>/dev/null || echo "No [notebook] extras declared; continuing with defaults."
        uv pip install --system jupyter nbconvert
    - name: Execute Notebooks
      run: |
        if [ ! -d notebooks ]; then
          echo "No notebooks directory. Skipping."
          exit 0
        fi
        shopt -s nullglob
        nbs=(notebooks/*.ipynb)
        if [ ${#nbs[@]} -eq 0 ]; then
          echo "No notebooks to verify."
          exit 0
        fi
        for nb in "${nbs[@]}"; do
          echo "Executing $nb..."
          jupyter nbconvert --to notebook --execute \
            --output "/tmp/$(basename "$nb" .ipynb)-ci.ipynb" \
            "$nb"
        done
